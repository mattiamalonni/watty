appId: com.watty.app
productName: Watty
copyright: "Copyright © 2024"

directories:
  buildResources: resources
  output: dist

files:
  - out/**/*
  - "!**/*.d.ts"
  - "!**/*.map"

extraResources:
  - from: resources/iconTemplate.png
    to: iconTemplate.png
  - from: resources/iconTemplate@2x.png
    to: iconTemplate@2x.png

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  category: public.app-category.healthcare-fitness
  darkModeSupport: true
  extendInfo:
    LSUIElement: true  # hides from Dock + no menu bar (app manages its own menu bar via Tray)
    NSUserNotificationAlertStyle: alert

dmg:
  sign: false

publish:
  provider: github
  owner: mattiamalonni
  repo: watty
  releaseType: release

nsis:
  oneClick: false

asar: true
